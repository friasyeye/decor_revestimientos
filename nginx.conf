server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Charset UTF-8 para nombres de archivo con caracteres especiales (ñ, etc.)
    charset utf-8;

    # Servir archivos precomprimidos .gz si el cliente los acepta
    gzip_static on;

    # Cabeceras de caché: assets con hash → caché larga (1 año)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Imágenes optimizadas → caché larga
    location /optimized/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Imágenes originales → caché moderada
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA routing: todas las rutas que no sean archivos existentes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
